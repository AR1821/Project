
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabudh AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#f4fcfd,#e9f7fb);
    display:flex;
    justify-content:center;
    align-items:center;
}

.chatbot-container{
    width:420px;
    height:760px;
    background:#fff;
    border-radius:28px;
    overflow:hidden;
    display:flex;
    flex-direction:column;

    box-shadow:
    0 10px 40px rgba(0,0,0,.08),
    0 2px 10px rgba(0,0,0,.05);
}

/* HEADER */

.chat-header{
    background:linear-gradient(135deg,#18c3c8,#2d8cff);
    padding:18px 20px;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.bot-avatar{
    width:52px;
    height:52px;
    border-radius:50%;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:26px;
}

.bot-info h2{
    font-size:20px;
    font-weight:600;
}

.bot-info p{
    font-size:13px;
    opacity:.9;
}

.header-icons{
    font-size:24px;
    cursor:pointer;
}

/* CHAT AREA */

.chat-area{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f9feff;

    display:flex;
    flex-direction:column;
    gap:16px;
}

.chat-area::-webkit-scrollbar{
    width:6px;
}

.chat-area::-webkit-scrollbar-thumb{
    background:#18c3c8;
    border-radius:10px;
}

/* MESSAGE */

.message-row{
    display:flex;
    gap:10px;
    align-items:flex-end;
}

.message-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#dff8fa;

    display:flex;
    justify-content:center;
    align-items:center;
}

.message{
    max-width:80%;
    padding:14px 18px;
    border-radius:20px;
    line-height:1.6;
    font-size:15px;
}

.bot-message p:last-child {
    margin-bottom: 0;
}

.bot-message{
    background:white;
    color:#0f172a;
    border-top-left-radius:6px;
    box-shadow:0 4px 10px rgba(0,0,0,.05);
    white-space: pre-line;
}

.user-row{
    display:flex;
    justify-content:flex-end;
}

.user-message{
    background:linear-gradient(135deg,#18c3c8,#2d8cff);
    color:white;
    padding:14px 18px;
    border-radius:20px;
    border-top-right-radius:6px;
    max-width:80%;
}

/* QUICK BUTTONS */

.quick-actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-left:50px;
}

.quick-btn{
    border:2px solid #18c3c8;
    background:white;
    color:#18c3c8;

    padding:10px 16px;
    border-radius:30px;

    cursor:pointer;
    transition:.3s;
}

.quick-btn:hover{
    background:#18c3c8;
    color:white;
}

/* TYPING */

.typing{
    display:flex;
    align-items:center;
    gap:5px;

    background:white;
    padding:14px 18px;
    border-radius:20px;
    width:80px;

    box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#18c3c8;

    animation:bounce 1.2s infinite;
}

.dot:nth-child(2){
    animation-delay:.2s;
}

.dot:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{

    0%,80%,100%{
        transform:scale(.6);
        opacity:.5;
    }

    40%{
        transform:scale(1);
        opacity:1;
    }
}

/* INPUT */

.chat-input-area{
    padding:15px;
    border-top:1px solid #e9f5f7;
}

.input-wrapper{
    display:flex;
    gap:10px;
    align-items:center;

    background:#f5fbfc;
    border-radius:18px;
    padding:10px 12px;
}

.chat-input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-size:15px;
}

.send-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    cursor:pointer;

    color:white;
    font-size:18px;

    background:linear-gradient(135deg,#18c3c8,#2d8cff);
}

/* MOBILE */

@media(max-width:480px){

.chatbot-container{
    width:100%;
    height:100vh;
    border-radius:0;
}

}

</style>
</head>

<body>

<div class="chatbot-container">

    <div class="chat-header">

        <div class="header-left">

            <div class="bot-avatar">
                🤖
            </div>

            <div class="bot-info">
                <h2>Sabudh AI</h2>
                <p>Online</p>
            </div>

        </div>

        <div class="header-icons">⋯</div>

    </div>

    <div class="chat-area" id="chatArea">

        <div class="message-row">

            <div class="message-avatar">🤖</div>

            <div class="message bot-message">
                👋 Welcome to Sabudh AI.
                Which program are you interested in?
            </div>

        </div>

        <div class="quick-actions">

            <button class="quick-btn">Data Science</button>
            <button class="quick-btn">Data analytics</button>
            <button class="quick-btn">AIOT</button>
           
            
        </div>

    </div>

    <div class="chat-input-area">

        <div class="input-wrapper">

            <input
                type="text"
                id="messageInput"
                class="chat-input"
                placeholder="Type your message..."
            >

            <button class="send-btn" id="sendBtn">
                ➤
            </button>

        </div>

    </div>

</div>

<script>

const chatArea = document.getElementById("chatArea");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

// genrating session id

let sessionId = sessionStorage.getItem("session_id");

if (!sessionId) {

    sessionId = crypto.randomUUID();

    sessionStorage.setItem(
        "session_id",
        sessionId
    );

}

/* USER MESSAGE */

function addUserMessage(text){

    const row = document.createElement("div");

    row.className = "user-row";

    row.innerHTML = `
        <div class="user-message">${text}</div>
    `;

    chatArea.appendChild(row);
}

/* BOT MESSAGE */

function addBotMessage(text){

    const row = document.createElement("div");

    row.className = "message-row";
    // const parsedHTML = marked.parse(text);

    row.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="message bot-message">${text}</div>
    `;

    chatArea.appendChild(row);
}

/* SHOW TYPING */

function showTyping(){

    const row = document.createElement("div");

    row.id = "typingRow";

    row.className = "message-row";

    row.innerHTML = `
        <div class="message-avatar">🤖</div>

        <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;

    chatArea.appendChild(row);
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });

}

/* REMOVE TYPING */

function removeTyping(){

    const row = document.getElementById("typingRow");

    if(row){
        row.remove();
    }
}

/* SEND */

async function sendMessage(){

    const text = input.value.trim();

    if(text==="") return;

    addUserMessage(text);
    input.value="";
    chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });

    showTyping();

    try{

        const response = await fetch(
            "http://127.0.0.1:8000/chat",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    message:text,
                    session_id:sessionId
                })
            }
        );

        const data = await response.json();

        removeTyping();

        addBotMessage(data.response);
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });

    }

    catch(error){

        removeTyping();

        addBotMessage(
            "⚠️ Unable to connect to backend server."
        );

        console.error(error);
    }
}

sendBtn.addEventListener("click",sendMessage);

input.addEventListener("keypress",(e)=>{

    if(e.key==="Enter"){
        sendMessage();
    }

});

document.querySelectorAll(".quick-btn").forEach(btn=>{

    btn.addEventListener("click",()=>{

        input.value = btn.innerText;

        sendMessage();

    });

});

</script>

</body>
</html>
